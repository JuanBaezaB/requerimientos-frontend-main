server {
    listen 0.0.0.0:4200;
    listen [::]:4200;
    server_name localhost;
    default_type application/octet-stream;
    error_log /var/log/nginx/error.log warn;
    

    # Quita version de nginx
    server_tokens off;
    # Necesarios para CORS

    add_header Access-Control-Allow-Origin '*' always;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept' always;
    
    # Headers de seguridad
    add_header Strict-Transport-Security 'max-age=63072000; includeSubDomains; preload' always;
    add_header X-Content-Type-Options 'nosniff';
    add_header X-Frame-Options 'DENY';
    add_header Referrer-Policy 'strict-origin-when-cross-origin';
    add_header Permissions-Policy 'accelerometer=(), autoplay=(), camera=(), clipboard-write=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()' always;
    add_header Cross-Origin-Opener-Policy 'same-origin' always;
    add_header Cross-Origin-Embedder-Policy 'require-corp' always;
    add_header Cross-Origin-Resource-Policy 'cross-origin' always;
    add_header Content-Security-Policy "default-src 'self'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.coordinador.cl; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' blob:; object-src 'none'; base-uri 'self';" always;

    # EH recomendacion header opcionales
    add_header Expect-CT "max-age=86400, enforce" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # add_header Clear-Site-Data "\"cache\", \"cookies\", \"storage\"" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Access-Control-Max-Age 86400 always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
